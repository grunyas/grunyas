name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: check out code
        uses: actions/checkout@v5

      - name: set up go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: test
        run: go test -race -v ./...

  integration-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30

    steps:
      - name: check out code
        uses: actions/checkout@v5

      - name: set up go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: integration test
        env:
          PGHOST: 127.0.0.1
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: postgres
        run: go test -race -tags=integration -v ./...

  sql-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30

    steps:
      - name: check out code
        uses: actions/checkout@v5

      - name: set up go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: install psql
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: sql test suite
        env:
          PGHOST: 127.0.0.1
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: postgres
        run: ./scripts/run-sql-tests.sh

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: check out code
        uses: actions/checkout@v5

      - name: set up go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.6

  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: check out code
        uses: actions/checkout@v5
      
      - name: dependency review
        uses: actions/dependency-review-action@v4
